<!DOCTYPE html>
<html lang="de"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiley Voting - Demokratie Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #2c3e50;
            padding-bottom: 90px;
        }

        .header {
            background: white;
            border-bottom: 2px solid #e9ecef;
            padding: 16px 24px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 14px;
            color: #7f8c8d;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .voting-panel {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        .voting-category {
            margin-bottom: 48px;
            text-align: center;
        }

        .voting-category:last-child {
            margin-bottom: 0;
        }

        .category-label {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            display: block;
        }

        .category-description {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 16px;
            font-style: italic;
        }

        .smileys {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .smiley {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #e9ecef;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            position: relative;
        }

        .smiley:hover {
            transform: scale(1.1);
            border-color: #667eea;
        }

        .smiley.selected {
            border-color: #667eea;
            background: #f0f4ff;
            transform: scale(1.2);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .smiley.red {
            border-color: #e74c3c;
        }

        .smiley.red.selected {
            background: #fadbd8;
            border-color: #c0392b;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .smiley.yellow {
            border-color: #f39c12;
        }

        .smiley.yellow.selected {
            background: #fdebd0;
            border-color: #d68910;
            box-shadow: 0 4px 12px rgba(243, 156, 18, 0.3);
        }

        .smiley.green {
            border-color: #27ae60;
        }

        .smiley.green.selected {
            background: #d5f4e6;
            border-color: #1e8449;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .smiley-label {
            position: absolute;
            bottom: -28px;
            font-size: 11px;
            font-weight: 600;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
            white-space: nowrap;
        }

        .smiley-label-container {
            position: relative;
            margin-bottom: 20px;
        }

        .submitted-feedback {
            margin-top: 32px;
            padding: 16px;
            background: #d5f4e6;
            border-left: 4px solid #27ae60;
            border-radius: 8px;
            display: none;
        }

        .submitted-feedback.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .submitted-feedback-text {
            font-size: 13px;
            color: #1e8449;
            font-weight: 600;
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* FOOTER */
        .footer {
            background: white;
            border-top: 2px solid #e9ecef;
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 76px;
            z-index: 999;
        }

        .footer-button {
            flex: 1;
            max-width: 150px;
            padding: 12px;
            border: 2px solid #e9ecef;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin: 0 4px;
            color: #2c3e50;
            text-align: center;
        }

        .footer-button:hover {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }

        .footer-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .voting-panel {
                padding: 24px;
            }

            .smiley {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }

            .category-label {
                font-size: 14px;
            }

            .header-title {
                font-size: 22px;
            }

            .footer {
                flex-wrap: wrap;
            }

            .footer-button {
                max-width: 100%;
                flex: 0 1 calc(33.333% - 8px);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">🎭 Demokratie Dashboard</div>
        <div class="header-subtitle">Deine tägliche Stimmungsabfrage</div>
    </div>

    <div class="container">
        <div class="voting-panel">
            <form id="votingForm" onsubmit="submitVotes(event)">
                <div class="voting-category">
                    <label class="category-label">😊 Wie zufrieden bist du?</label>
                    <div class="category-description">Deine allgemeine Zufriedenheit heute</div>
                    <div class="smileys">
                        <div class="smiley red" onclick="selectSmiley('satisfaction', 'bad', this)">😢</div>
                        <div class="smiley yellow" onclick="selectSmiley('satisfaction', 'medium', this)">😐</div>
                        <div class="smiley green" onclick="selectSmiley('satisfaction', 'good', this)">😊</div>
                    </div>
                </div>

                <div class="voting-category">
                    <label class="category-label">⚡ Wie ist dein Energielevel?</label>
                    <div class="category-description">Deine körperliche &amp; mentale Energie</div>
                    <div class="smileys">
                        <div class="smiley red" onclick="selectSmiley('energy', 'bad', this)">😴</div>
                        <div class="smiley yellow" onclick="selectSmiley('energy', 'medium', this)">🙂</div>
                        <div class="smiley green" onclick="selectSmiley('energy', 'good', this)">⚡</div>
                    </div>
                </div>

                <div class="voting-category">
                    <label class="category-label">💼 Bist du ausgelastet?</label>
                    <div class="category-description">Deine aktuelle Workload &amp; Stress-Level</div>
                    <div class="smileys">
                        <div class="smiley red" onclick="selectSmiley('workload', 'bad', this)">😫</div>
                        <div class="smiley yellow" onclick="selectSmiley('workload', 'medium', this)">🤷</div>
                        <div class="smiley green" onclick="selectSmiley('workload', 'good', this)">👍</div>
                    </div>
                </div>

                <button type="submit" class="submit-button">✅ Abstimmung speichern</button>
                
                <div class="submitted-feedback" id="feedback">
                    <div class="submitted-feedback-text">✨ Danke für dein Feedback! Deine Antworten wurden gespeichert.</div>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        <a href="voting.html" class="footer-button active">
            <span>😊 Voting</span>
        </a>
        <a href="concerns.html" class="footer-button">
            <span>💡 Anliegen</span>
        </a>
        <a href="dashboard.html" class="footer-button">
            <span>📊 Dashboard</span>
        </a>
    </div>

    <script>
        const userVotes = JSON.parse(localStorage.getItem('userVotes')) || {
            satisfaction: null,
            energy: null,
            workload: null
        };

        // Restore previous selections
        function restoreSelections() {
            for (const [key, value] of Object.entries(userVotes)) {
                if (value) {
                    const smiley = document.querySelector(`[onclick*="'${key}'"][onclick*="'${value}'"]`);
                    if (smiley) {
                        smiley.classList.add('selected');
                    }
                }
            }
        }

        function selectSmiley(category, value, element) {
            // Remove previous selection
            const parent = element.parentElement;
            parent.querySelectorAll('.smiley').forEach(s => s.classList.remove('selected'));
            
            // Add new selection
            element.classList.add('selected');
            
            // Store in memory
            userVotes[category] = value;
            
            // Visual feedback
            element.style.transform = 'scale(1.25)';
            setTimeout(() => {
                if (element.classList.contains('selected')) {
                    element.style.transform = 'scale(1.2)';
                }
            }, 100);
        }

        function submitVotes(e) {
            e.preventDefault();

            // Check if all selected
            if (!userVotes.satisfaction || !userVotes.energy || !userVotes.workload) {
                alert('⚠️ Bitte alle 3 Kategorien bewerten!');
                return;
            }

            // Save to localStorage
            localStorage.setItem('userVotes', JSON.stringify(userVotes));
            
            // Add to history
            const history = JSON.parse(localStorage.getItem('votingHistory')) || [];
            history.push({
                date: new Date().toLocaleDateString('de-DE'),
                votes: {...userVotes}
            });
            localStorage.setItem('votingHistory', JSON.stringify(history));

            // Show feedback
            const feedback = document.getElementById('feedback');
            feedback.classList.add('active');

            setTimeout(() => {
                feedback.classList.remove('active');
            }, 4000);
        }

        // Initialize
        restoreSelections();
    </script>


</body></html>
