<html lang="de"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anliegen Voting - Demokratie Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #2c3e50;
            padding-bottom: 90px;
        }

        .header {
            background: white;
            border-bottom: 2px solid #e9ecef;
            padding: 16px 24px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 14px;
            color: #7f8c8d;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
        }

        .swipe-wrapper {
            width: 100%;
            max-width: 600px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swipe-hints {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 12px;
            font-weight: 600;
            color: #bdc3c7;
            top: 20px;
            z-index: 1;
            pointer-events: none;
        }

        .swipe-hint-left {
            text-align: left;
        }

        .swipe-hint-right {
            text-align: right;
        }

        .sticky-note {
            position: absolute;
            width: 340px;
            height: 180px;                  /* fixe Höhe für exakte Zentrierung */
            left: 50%;                      /* horizontal zentrieren */
            margin-left: -170px;            /* halbe Breite */
            top: 50%;                       /* vertikal zentrieren */
            margin-top: -90px;              /* halbe Höhe */
            padding: 32px 24px;
            background: linear-gradient(135deg, #ffd89b 0%, #ffed4e 100%);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            cursor: grab;
            user-select: none;
            font-size: 18px;
            line-height: 1.6;
            color: #2c3e50;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
            transform-origin: center;
        }

        .sticky-note:active {
            cursor: grabbing;
        }

        .sticky-note.dragging {
            opacity: 0.9;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .sticky-note.swiped-left {
            animation: swipeLeft 0.4s ease forwards;
        }

        .sticky-note.swiped-right {
            animation: swipeRight 0.4s ease forwards;
        }

        .sticky-note.finished {
            background: linear-gradient(135deg, #e9ecef 0%, #bdc3c7 100%);
            cursor: default;
        }

        @keyframes swipeLeft {
            0% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateX(-600px) rotate(-25deg) scale(0.8); opacity: 0; }
        }

        @keyframes swipeRight {
            0% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateX(600px) rotate(25deg) scale(0.8); opacity: 0; }
        }

        .vote-indicator {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sticky-note.dragging .vote-indicator {
            opacity: 0.3;
        }

        .vote-indicator-left,
        .vote-indicator-right {
            font-size: 32px;
        }

        .add-button {
            position: absolute;
            bottom: 20px;
            /* kein left – bleibt wie ursprünglich */
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 36px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .add-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.4);
        }

        .add-button:active {
            transform: scale(0.95);
        }

        .progress {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 16px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .modal-description {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
            resize: vertical;
            min-height: 120px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
            background: #f0f4ff;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .modal-button.confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-button.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .modal-button.cancel {
            background: #f0f0f0;
            color: #2c3e50;
        }

        .modal-button.cancel:hover {
            background: #e0e0e0;
        }

        .character-count {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        /* FOOTER */
        .footer {
            background: white;
            border-top: 2px solid #e9ecef;
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 76px;
            z-index: 999;
        }

        .footer-button {
            flex: 1;
            max-width: 150px;
            padding: 12px;
            border: 2px solid #e9ecef;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin: 0 4px;
            color: #2c3e50;
            text-align: center;
        }

        .footer-button:hover {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
        }

        .footer-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .swipe-wrapper {
                height: 350px;
            }

            .sticky-note {
                width: 280px;
                height: 160px;
                margin-left: -140px;
                margin-top: -80px;
                font-size: 16px;
                padding: 24px 20px;
            }

            .add-button {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }

            .header-title {
                font-size: 22px;
            }

            .footer {
                flex-wrap: wrap;
            }

            .footer-button {
                max-width: 100%;
                flex: 0 1 calc(33.333% - 8px);
            }

            .progress {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">💡 Anliegen-Voting</div>
        <div class="header-subtitle">Teile deine Gedanken - Swipen links/rechts</div>
    </div>

    <div class="container">
        <div class="swipe-hints">
            <div class="swipe-hint-left">👈 Nicht relevant</div>
            <div class="swipe-hint-right">Relevant 👉</div>
        </div>

        <div class="progress">
            <span id="currentIndex">2</span> / <span id="totalCount">10</span>
        </div>

        <div class="swipe-wrapper" id="swipeWrapper">
            <div id="stickyNoteContainer"><div class="sticky-note" id="currentSticky">Kotzen</div></div>
        </div>

        <button class="add-button" onclick="openAddConcernModal()" title="Neues Anliegen hinzufügen">+</button>
    </div>

    <!-- MODAL -->
    <div id="addConcernModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">💡 Dein Anliegen teilen</div>
            <div class="modal-description">Was liegt dir am Herzen? Lass es die anderen wissen!</div>
            <textarea id="concernText" class="modal-input" placeholder="Schreib hier dein Anliegen (z.B. 'Bessere Kaffeequalität im Büro')..." maxlength="200"></textarea>
            <div class="character-count"><span id="charCount">0</span>/200</div>
            <div class="modal-buttons">
                <button class="modal-button cancel" onclick="closeAddConcernModal()">Abbrechen</button>
                <button class="modal-button confirm" onclick="submitConcern()">Hochswipen 📤</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="voting.html" class="footer-button">
            <span>😊 Voting</span>
        </a>
        <a href="concerns.html" class="footer-button active">
            <span>💡 Anliegen</span>
        </a>
        <a href="dashboard.html" class="footer-button">
            <span>📊 Dashboard</span>
        </a>
    </div>

    <script>
        const defaultConcerns = [
            "Kaffeequalität im Büro verbessern",
            "Mehr Remote-Tage ermöglichen",
            "Wellness-Kurse anbieten",
            "Bessere Meeting-Raumausstattung",
            "Regelmäßigere Team-Events",
            "Verbesserung der Fahrstuhl-Reinigung",
            "Gehalt anpassen nach Inflation",
            "Verbesserung der Klimatisierung"
        ];

        let concerns = JSON.parse(localStorage.getItem('concerns')) || [...defaultConcerns];
        let currentConcernIndex = 0;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;
        let concernVotes = JSON.parse(localStorage.getItem('concernVotes')) || {};

        function renderSticky() {
            const container = document.getElementById('stickyNoteContainer');
            container.innerHTML = '';

            if (currentConcernIndex < concerns.length) {
                const note = document.createElement('div');
                note.className = 'sticky-note';
                note.textContent = concerns[currentConcernIndex];
                note.id = 'currentSticky';
                
                note.addEventListener('mousedown', startDrag);
                note.addEventListener('touchstart', startDrag);
                
                container.appendChild(note);
            } else {
                const note = document.createElement('div');
                note.className = 'sticky-note finished';
                note.innerHTML = '✨ Alle Anliegen angesehen!<br><br>Komm morgen wieder.<br><span style="font-size: 24px; margin-top: 12px;">😊</span>';
                note.style.cursor = 'default';
                container.appendChild(note);
            }

            document.getElementById('currentIndex').textContent = currentConcernIndex + 1;
            document.getElementById('totalCount').textContent = concerns.length;
        }

        function startDrag(e) {
            if (currentConcernIndex >= concerns.length) return;
            
            isDragging = true;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            currentX = startX;
            const note = document.getElementById('currentSticky');
            if (note) note.classList.add('dragging');
        }

        function moveDrag(e) {
            if (!isDragging) return;
            currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const note = document.getElementById('currentSticky');
            if (note) {
                const diff = currentX - startX;
                note.style.transform = `translateX(${diff}px) rotate(${diff * 0.15}deg) scale(${1 - Math.abs(diff) * 0.0005})`;
            }
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            
            const note = document.getElementById('currentSticky');
            const diff = currentX - startX;
            
            if (note) {
                if (Math.abs(diff) > 100) {
                    if (diff > 0) {
                        note.classList.add('swiped-right');
                        recordVote(currentConcernIndex, 'relevant');
                    } else {
                        note.classList.add('swiped-left');
                        recordVote(currentConcernIndex, 'not-relevant');
                    }
                    
                    setTimeout(() => {
                        currentConcernIndex++;
                        renderSticky();
                    }, 400);
                } else {
                    note.style.transform = 'translateX(0) rotate(0deg) scale(1)';
                    note.classList.remove('dragging');
                }
            }
        }

        function recordVote(index, value) {
            if (!concernVotes[index]) {
                concernVotes[index] = { concern: concerns[index], vote: value };
                localStorage.setItem('concernVotes', JSON.stringify(concernVotes));
            }
        }

        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchmove', moveDrag);
        document.addEventListener('touchend', endDrag);

        function openAddConcernModal() {
            document.getElementById('addConcernModal').classList.add('active');
            document.getElementById('concernText').focus();
        }

        function closeAddConcernModal() {
            document.getElementById('addConcernModal').classList.remove('active');
            document.getElementById('concernText').value = '';
            document.getElementById('charCount').textContent = '0';
        }

        function submitConcern() {
            const text = document.getElementById('concernText').value.trim();
            if (text.length < 5) {
                alert('⚠️ Bitte mindestens 5 Zeichen eingeben!');
                return;
            }

            concerns.unshift(text);
            localStorage.setItem('concerns', JSON.stringify(concerns));
            
            currentConcernIndex = 0;
            renderSticky();
            closeAddConcernModal();
        }

        // Character count
        document.getElementById('concernText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('addConcernModal');
            if (event.target === modal) {
                closeAddConcernModal();
            }
        }

        // Initialize
        renderSticky();
    </script>
</body></html>
